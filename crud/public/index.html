<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de afazeres</title>

    <link rel="stylesheet" href="./css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Minhas Tarefas</h1>
            <p class="subtitulo">Organize seus estudos e acompanhe seu progresso</p>
        </section>
        <section class="form-container">
            <form action="" id="formTarefa">
                <div class="box-nova-tarefa">
                    <input type="text" name="input-tarefa" id="inputTarefa">
                    <button type="submit" id="btnAdicionar">Adicionar</button>
                </div>

                <!-- Lista de tarefas -->
                <ul class="tarefas" id="listaTarefas">

                </ul>
            </form>
        </section>

    </main>
    <script src="./script.js"></script>
</body>
</html>
