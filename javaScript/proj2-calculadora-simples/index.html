<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple calculator</title>

    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>simple calculator</h1>
        </header>
        <form action="">
            <div class="inputs-containers">
                <!-- first number -->
                <section>
                    <input type="text" id="number1">
                </section>
                <!-- second number -->
                <section>
                    <input type="text" id="number2">
                </section>
            </div>
            <!-- Operation buttons -->
            <div class="operations">
                <button type="submit" id="add"><i class="fa-solid fa-plus"></i> </button>
                <button type="submit" id="subtract"><i class="fa-solid fa-minus"></i> </button>
                <button type="submit" id="multiply"><i class="fa-solid fa-xmark"></i> </button>
                <button type="submit" id="divide"><i class="fa-solid fa-divide"></i> </button>
            </div>

            <!-- result -->
            <section class="result"></section>
        </form>
    </main>
    <script src="./js/script.js"></script>
</body>
</html>
