<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora com Try Catch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
        <h1>Calculadora de Divisão</h1>
        <p class="subtitle">Treinando try...catch no JavaScript</p>

        <form id="form">
            <div class="field">
                <label for="number1">Primeiro número</label>
                <input type="text" id="number1" placeholder="Digite o primeiro número">
            </div>

            <div class="field">
                <label for="number2">Segundo número</label>
                <input type="text" id="number2" placeholder="Digite o segundo número">
            </div>

            <button type="submit">Calcular</button>
        </form>

        <section id="message" class="message hidden"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
