<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma 2 números</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <h1>Add Numbers 🚀</h1>
    </header>
    <main>
        <section>
            <form action="">
                <div class="box">
                    <input type="text" name="firstNumber" id="firstNumber">
                </div>

                <div>
                    <span>➕</span>
                </div>
                
                <div class="box">
                    <input type="text" name="secondNumber" id="secondNumber">
                </div>
               
                <div>
                    <span>🟰</span>
                </div>

                <div class="result">
                    <h2 id="result">0</h2>
                </div>

                <div class="box-button">
                    <button>Add</button>
                </div>
            </form>
        </section>
    </main>

    <script src="./js/script.js"></script>
</body>
</html>
